<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="h-screen flex flex-col justify-center items-center gap-12 bg-teal-100">
    
    <div class="bg-black w-full h-64  flex justify-center items-center gap-24 m-2 rounded-lg">

        <button id="redbtn" class="bg-red-600 text-white rounded-lg w-20 p-2 cursor-pointer">Red</button>
        <button id="yellowbtn" class="bg-yellow-400 text-white rounded-lg w-20 p-2 cursor-pointer">Yellow</button>
        <button id="greenbtn" class="bg-green-600 text-white rounded-lg w-20 p-2 cursor-pointer">Green</button>

    </div>

    <div class=" w-full h-96 flex justify-center items-center m-2">
        <p id="circle" class="bg-teal-100 w-96 h-96 rounded-full m-5 p-5 flex justify-center items-center text-3xl text-teal-100">Color</p>
    </div>
    
    <script src="Assets/Js/colors.js"></script>
</body>
</html>
