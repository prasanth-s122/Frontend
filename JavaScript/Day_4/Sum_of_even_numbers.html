<script>
    // Input
    let initial_number = 1
    let final_number = 20
    
    // Process
    
    let number = 1
   
    let sum = 0

    for (number = initial_number ; number <= final_number ; number++){
        
        if (number % 2 == 0){
        
            sum += number
        
        }
        
    }
    
    console.log("Sum of even numbers from " + initial_number + " to " + final_number + " is " + sum);
    
    
</script>
