<script>
    
    let number_input = 10
    console.log(number_input + " numbers will be added from 1");

    let number_sum = 0

    for (let number = 1 ; number <= number_input ; number++){
        
        number_sum += number
        
    }

    console.log("Sum of first " + number_input + " numbers is " + number_sum);
    
    
    
</script>
