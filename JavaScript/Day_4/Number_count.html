<script>
    // Input
    let initial_number = 1
    let number_count = 50
    
    // Process
    
    let number = 1
    
    let count = 0

    for (number = initial_number ; number <= number_count ; number++){
        
        count++
        
    }
    
    console.log(count + " numbers is present between " + initial_number + " and " + number_count);
    
    
</script>
