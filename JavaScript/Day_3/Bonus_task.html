<script>
    let input_number = -15
    console.log("The number is " + input_number)

    if (input_number == 10){
        console.log(input_number + " is even and divisible by 5")
    }

    else if (input_number < 10 && input_number % 2 != 0 && input_number % 5 == 0 ){
        console.log(input_number + " is odd, less than 10 and divisible by 5")
    }

    else if(input_number % 2 == 0 && input_number > 10 && input_number % 5 == 0){
        console.log(input_number + " is even, greater than 10 and divisible by 5")
    }

    else if(input_number % 2 != 0 && input_number > 10 && input_number % 5 == 0){
        console.log(input_number + " is odd, greater than 10 and divisible by 5")
    }

    else if(input_number % 2 == 0 && input_number > 10 && input_number % 5 != 0){
        console.log(input_number + " is even, greater than 10 and not divisible by 5")
    }

    else if(input_number % 2 == 0 && input_number < 10 && input_number % 5 != 0){
        console.log(input_number + " is even, less than 10 and not divisible by 5")
    }


    else if(input_number % 2 != 0 && input_number > 10 && input_number % 5 != 0){
        console.log(input_number + " is odd, greater than 10 and not divisible by 5")
    }

    else{
        console.log(input_number + " is odd, less than 10 and not divisible by 5")
    }

</script>
