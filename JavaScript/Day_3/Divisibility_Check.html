<script>
    let input_number = 15
    console.log("The number is " + input_number)

    // Divisibility check
    if (input_number % 3 == 0 && input_number % 5 == 0){
        
        console.log(input_number + " is divisible by both 3 and 5")
        
    }

    else if (input_number % 3 == 0){

        console.log(input_number + " is divisible only by 3")
        

    }

    else if (input_number % 5 == 0){

        console.log(input_number + " is divisible only by 5")

    }

    else{

        console.log(input_number + " is not divisible by both 3 and 5")
        

    }
    
</script>
