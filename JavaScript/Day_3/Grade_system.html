<script>
    let student_mark = 90
    console.log("Mark is " + student_mark)
    

    // Grading

    if (student_mark >= 90){
        console.log("Grade is A")
    }
    else if (student_mark >= 75){
        console.log("Grade is B")
    }
    else if (student_mark >= 50){
        console.log("Grade is C")
    }
    
    else {
        console.log("Fail")
    }
</script>
