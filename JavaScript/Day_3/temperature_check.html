<script>
    let input_temperature = 35
    console.log("Temperature is " + input_temperature + "˚C")

    if (input_temperature > 30){
        console.log("Temperature is hot")
        
    }
    else if (input_temperature < 30 && input_temperature >= 20){
        console.log("Temperature is normal")
    }
    else{
        console.log("Temperature is cold")
    }
    
</script>
