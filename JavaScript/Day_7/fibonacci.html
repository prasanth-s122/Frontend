<script>
    let number = 10

    const fibonacci = (a) => {

        let first_number = 0
        let second_number = 1
        console.log(first_number);
        console.log(second_number);
        
        

        for(let i = 2 ; i < a ; i++){

            let next_number = first_number + second_number

            console.log(next_number);

            first_number = second_number
            second_number = next_number
            

        }
    }

    console.log("The fibonacci series of " + number + " numbers is");
    fibonacci(number)
    
</script>
