<script>
    let string = "Java Script"
    console.log("The string is " , string);
    

    const reverse = (a) => {

        let reverse_string = ""

        for(let i = a.length - 1 ; i >= 0 ; i--){

            reverse_string += a[i]

        }

        return reverse_string

    }


    console.log("The reversed string is " , reverse(string));
    
</script>
