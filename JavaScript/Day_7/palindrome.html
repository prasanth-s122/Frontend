<script>
    let string = "madam"
    console.log("The string is " , string);
    

    const palindrome = (a) => {

        let reverse_string = ""

        for(let i = a.length - 1 ; i >= 0 ; i--){

            reverse_string += a[i]

        }

        return reverse_string

    }


    let reverse = palindrome(string)

    if(string === reverse){

        console.log(string , " is palindrome");
        

    }else{

        console.log(string , " is not palindrome");
        

    }
    
</script>
