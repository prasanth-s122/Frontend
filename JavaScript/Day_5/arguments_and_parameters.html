<script>
    // Addition
    let input_a = 100;
    let input_b = 20;

    let addition = (a , b) => {
        return a + b;
    };

    let output_c = addition(input_a , input_b);
    console.log("Addition: " + output_c);

    // Subtraction
    let subtraction = (a , b) => {
        return a - b;
    };
    let output_d = subtraction(input_a , input_b);
    console.log("Subtraction: " + output_d);

    // Multiplication
    let multiplication = (a , b) => {
        return a * b;
    };
    let output_e = multiplication(input_a , input_b);
    console.log("Multiplication: " + output_e);

    // Division
    let division = (a , b) => {
        return a / b;
    };
    let output_f = division(input_a , input_b);
    console.log("Division: " + output_f);

    // Modulus
    let modulus = (a , b) => {
        return a % b;
    };
    let output_g = modulus(input_a , input_b);
    console.log("Modulus: " + output_g);

    // Square
    let square_number = 15
    let square = (a) => {
        return a * a;
    };
    let output_h = square(square_number);
    console.log("Square: " + output_h);

// Cube
    let cube_number = 5;
    let cube = (a) => {
        return a * a * a;
    };
    let output_i = cube(cube_number);
    console.log("Cube: " + output_i);

    // Power
    let base = 2;
    let exponent = 4;
    let power = (a , b) => {
        return a ** b;
    };
    let output_j = power(base , exponent);
    console.log("Power: " + output_j);

    // Square Root
    let square_root_number = 25;
    let square_root = (a) => {
        return Math.sqrt(a);
    };
    let output_k = square_root(square_root_number);
    console.log("Square Root: " + output_k);

    // Cube Root
    let cube_root_number = 27;
    let cube_root = (a) => {
        return Math.cbrt(a);
    };
    let output_l = cube_root(cube_root_number);
    console.log("Cube Root: " + output_l);
    

</script>
