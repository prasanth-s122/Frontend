<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Storage</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="h-screen flex justify-center items-center bg-gray-100">

    <div>

        <form class="flex flex-col gap-4 w-[400px] p-6 border-2 rounded-lg shadow-lg bg-white">

            <h2 class="text-2xl font-[Poppins] text-center mb-2">Register</h2>

            

            <div class="flex items-center gap-4">
                <label for="name" class="w-24">Name</label>
                <input id="name" type="text" placeholder="Enter your name" class="border p-2 rounded shadow flex-1">
            </div>

            <div class="flex items-center gap-4">
                <label for="email" class="w-24">E-mail</label>
                <input id="email" type="email" placeholder="Enter your mail id" class="border p-2 rounded shadow flex-1">
            </div>

            <div class="flex items-center gap-4">
                <label for="password" class="w-24">Password</label>
                <input id="password" type="password" placeholder="Set password" class="border p-2 rounded shadow flex-1">
            </div>

                <button id="registerBtn" class="bg-blue-500 hover:bg-blue-600 text-white p-2 rounded shadow mt-4">Register</button>

        </form>

    </div>

    <script src="Assets/JS/Register.js"></script>

</body>
</html>
