<script>
    let number_array = [1 , 3 , 5 , 15 ,10 , 19 , 30 , 39 , 50]

    const print = (a , i ) => {
        if (a[i] % 2 == 0){
            
            console.log(a[i]);
            
        }
    }

    const process = (a , show) => {
        let length_array = a.length

        console.log("The even numbers in the array are...")

        for (let i = 0 ; i < length_array ; i++) {
            show(a , i)
        }
    }

    process (number_array , print)

</script>
