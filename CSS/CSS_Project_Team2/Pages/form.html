<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <link rel="stylesheet" href="form.css">
    <link rel="shortcut icon" href="../Images/fav.png" type="image/x-icon">
</head>

<body>
    <div class="main">
        <center><h1>Place order form</h1></center>
        <form class="form" action="confirmed.html"><center>
            <table>
                
                           
                <tr>
                    
                    <td><label>Sender</label></td>
                    <td><input type="text" placeholder="Sender name"  required></td>   
                    
                </tr>

                <tr>
                    <td><label for="">Sender Contact</label></td>
                    <td><input type="tel" maxlength=10 minlength=10 placeholder="Enter mobile number" required></td>
                </tr>


                 <tr>
                    
                    <td><label for="">Pickup address</label></td>
                    <td><textarea name="" id="" placeholder="Enter pickup address"  required></textarea></td>
                    
                </tr>

                <tr>
                    
                    <td><label for="">Reciever</label></td>
                    <td><input type="text" placeholder="Reciever name"  required></td>
                    
                </tr>

                <tr>
                    <td><label for="">Reciever Contact</label></td>
                    <td><input type="tel" maxlength=10 minlength=10 placeholder="Enter mobile number" required></td>
                </tr>

               
                <tr>
                    
                    <td><label for="">Deliver address</label></td>
                    <td><textarea name="" id="" placeholder="Enter delivery address"  required></textarea></td>
                    
                </tr>

                <tr>
                    <td>
                        <input class="book" type="submit" value="Book">
                    </td>
                </tr>
           
            
            
            </table>
        </center></form>
        
        
    </div>
    

</body>

</html>
