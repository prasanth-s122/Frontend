<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Market</title>
    <link rel="stylesheet" href="Product.css">
    <link rel="shortcut icon" href="Products/Racoon.jpg" type="image/x-icon">
</head>
<body>
    <header>
        <div class="title">
            <center><h1>Rocket Racoon's Black market</h1></center>
        </div>
    </header>
    <br><br>
    <div class="Container">
        <div class="Products">
            <img src="Products/IG.jpg" alt="Infinity Gauntlet">
            <h3>Infinity Gauntlet</h3>
            <p>A Gauntlet with complete set of all infinity stones</p>
            <h4 class="price">$9000</h4>
            <button>Buy Now!</button>
        </div>

        <div class="Products">
            <img src="Products/SB2.jpg" alt="Stormbreaker">
            <h3>Storm Breaker</h3>
            <p>A Thanos killing kind weapon made for Thor</p>
            <h4 class="price">$5000</h4>
            <button>Buy Now!</button>
        </div>

        <div class="Products">
            <img src="Products/CA.jpg" alt="Captain America's Shield">
            <h3>Shield</h3>
            <p>Just a shield stolen from Captain America</p>
            <h4 class="price">$2000</h4>
            <button>Buy Now!</button>
        </div>
        
    </div>
</body>
</html>
