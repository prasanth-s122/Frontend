<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping</title>
    <link rel="stylesheet" href="cardsflex.css">
    <link rel="shortcut icon" href="Products/fav.png" type="image/x-icon">
</head>
<body>
    <div>
        <div class="container">
            <div class="card">
                <img src="Products/headphones.png" alt="">
                <h3>Wireless Headphones</h3>
                <p><i>High-quality wireless headphones with clear sound and comfortable design for daily use</i></p>
                <h4>₹3000</h4>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="Products/smartwatch.jpg" alt="">
                <h3>Smart Watch</h3>
                <p><i>A stylish smartwatch that tracks your fitness and shows notifications</i></p>
                <h4>₹2000</h4>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="Products/shoes1.jpg" alt="">
                <h3>Shoes</h3>
                <p><i>Comfortable and lightweight shoes suitable for running and everyday activities</i></p>
                <h4>₹2000</h4>
                <button>Buy Now</button>
            </div>
        </div>
    </div>
</body>
</html>
