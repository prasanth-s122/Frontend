<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Aid - Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="Assets/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="Assets/css/styles.css">
</head>
<body class="bg-animated-gradient min-h-screen flex text-slate-200">
    
    <!-- Left side - decorative/image -->
    <div class="hidden lg:flex lg:w-1/2 flex-col justify-center items-center p-12 relative overflow-hidden">
        <!-- Decorative glowing orbs -->
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-neonBlue rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-pulse-slow"></div>
        <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-neonPurple rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-pulse-slow font-delay-2000"></div>
        
        <div class="z-10 text-center animate-slide-up">
            <h1 class="text-6xl font-bold mb-6 tracking-tight">Welcome to <br><span class="text-gradient">Auto Aid</span></h1>
            <p class="text-xl text-slate-400 max-w-md mx-auto leading-relaxed">Your ultimate premium roadside assistance. Fast, reliable, and always ready.</p>
        </div>
    </div>

    <!-- Right side - Form -->
    <div class="w-full lg:w-1/2 flex justify-center items-center p-4 sm:p-8 animate-fade-in relative z-10">
        <div class="glass p-8 sm:p-10 w-full max-w-lg rounded-2xl relative overflow-hidden">
            <!-- Glowing accent line at top -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-neonBlue to-neonPurple"></div>
            
            <form action="Assets/login.html" method="post" class="space-y-6">
                
                <!-- Title -->
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-white mb-2">Create Account</h2>
                    <p class="text-slate-400 text-sm">Join Auto Aid today to experience premium assistance</p>
                </div>

                <div class="space-y-4">
                    <!-- Name -->
                    <div>
                        <label class="block text-slate-300 text-sm font-semibold mb-2" for="name">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" class="glass-input w-full px-4 py-3 rounded-xl" required>
                    </div>
                        
                    <!-- E-mail -->
                    <div>
                        <label class="block text-slate-300 text-sm font-semibold mb-2" for="email">E-mail Address</label>
                        <input type="email" id="email" placeholder="john@example.com" class="glass-input w-full px-4 py-3 rounded-xl" required>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <!-- Age -->
                        <div>
                            <label class="block text-slate-300 text-sm font-semibold mb-2" for="age">Age</label>
                            <input type="number" id="age" placeholder="25" class="glass-input w-full px-4 py-3 rounded-xl" required>
                        </div>
                        
                        <!-- Mobile number -->
                        <div>
                            <label class="block text-slate-300 text-sm font-semibold mb-2" for="contact">Mobile Number</label>
                            <input type="tel" inputmode="numeric" id="contact" pattern="[0-9]{10}" maxlength="10" placeholder="9876543210" class="glass-input w-full px-4 py-3 rounded-xl" required>
                        </div>
                    </div>

                    <!-- Address -->
                    <div>
                        <label class="block text-slate-300 text-sm font-semibold mb-2" for="address">Residential Address</label>
                        <textarea id="address" rows="2" placeholder="123 Main St..." class="glass-input w-full px-4 py-3 rounded-xl resize-none" required></textarea>
                    </div>
                    
                    <!-- Password -->
                    <div>
                        <label class="block text-slate-300 text-sm font-semibold mb-2" for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" class="glass-input w-full px-4 py-3 rounded-xl" required>
                    </div>
                </div>

                <!-- Button -->
                <div class="pt-4">
                    <button type="submit" class="w-full py-3 px-4 bg-gradient-to-r from-neonBlue to-neonPurple text-white font-bold rounded-xl shadow-[0_0_15px_rgba(0,242,254,0.4)] hover:shadow-[0_0_25px_rgba(0,242,254,0.6)] transform hover:-translate-y-1 transition-all duration-300">
                        Sign Up Now
                    </button>
                </div>
                
                <p class="text-center text-sm text-slate-400 mt-6">
                    Already have an account? <a href="Assets/login.html" class="text-neonBlue hover:text-neonPurple transition-colors font-semibold">Log in</a>
                </p>
                
            </form>
        </div>
    </div>
</body>
</html>
