<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200">
    <div class="container h-screen flex justify-center items-center">
            <div class=" p-4 max-w-lg w-full bg-gray-50 flex justify-center items-center rounded-lg shadow-[0_10px_10px_10px_gray]">
                <form action="Assets/login.html" method="post" >
                    
                    <!-- Title -->
                    <div>
                        <p class="text-2xl font-bold text-center text-blue-700 mb-6">REGISTRATION</p>
                    </div>
                    <!-- Name -->
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2" for="name">Name</label>
                        <input type="text" id="name"  class=" w-full px-10 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition duration-300 focus:bg-blue-50" >
                    </div>
                        
                    <!-- E mail -->
                    <div class="mb-4">
                        <label  for="email">E-mail</label>
                        <input type="email" id="email" class=" w-full px-10 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition duration-300 focus:bg-blue-50" >
                    </div>

                    <!-- Age -->
                     <div class="mb-4">
                        <label  for="age">Age</label>
                        <input type="number" id="age" class=" w-full px-10 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition duration-300 focus:bg-blue-50" >
                    </div>
                    
                    <!-- Password -->
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2" for="password">Password</label>
                        <input type="password" name="" id="password" class=" w-full px-10 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition duration-300 focus:bg-blue-50">
                    </div>

                    <!-- Mobile number -->
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2" for="contact">Mobile number</label>
                        <input type="tel" inputmode="numeric" name="" id="contact" pattern="[0-9]{10}" maxlength="10" class=" w-full px-10 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition duration-300 focus:bg-blue-50">
                    </div>

                    <!-- Address -->
                    <div class="mb-4">
                        <label class="block text-gray-700 font-semibold mb-2" for="address">Address</label>
                        <textarea name="" id="address" class=" w-full px-10 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition duration-300 focus:bg-blue-50"></textarea>
                    </div>

                    <!-- Button -->
                    <div class="mb-4">
                        <button type="submit" class="bg-blue-500 text-white px-10 py-2 w-full hover:bg-blue-700 transition duration-700 rounded-lg">Sign in</button>
                    </div>
                    
                    
                </form>
            </div>
    </div>
</body>
</html>
