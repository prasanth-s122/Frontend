<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Assets/css/bootstrap.min.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100">
    <div class="container mt-5 bg-primary-subtle w">
            <div class="row justify-content-center " >
                <form action="" method="post" class="col-md-6">
                    <label class="form-label" for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your name" class="form-control" >
                    <label class="form-label" for="email">Enter e-mail</label>
                    <input type="email" id="email" class="form-control">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" name="" id="password" class="form-control">
                    <label class="form-label" for="contact">Mobile number</label>
                    <input type="tel" inputmode="numeric" name="" id="contact" pattern="[0-9]{10}" maxlength="10" class="form-control">
                    <label class="form-label" for="address">Address</label>
                    <textarea name="" id="address" class="form-control"></textarea>
                    
                    <input type="submit" value="Register" class="btn btn-primary m-3">
                </form>
            </div>
    </div>
</body>
</html>
