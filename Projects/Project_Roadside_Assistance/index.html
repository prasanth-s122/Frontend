<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="h-screen flex justify-center items-center" >
            <div class="container p-5 border border-black rounded-xl max-w-lg " >
                <form action="" method="post" class="flex flex-col gap-3">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your name" class="border border-black rounded-lg">
                    <label for="email">Enter e-mail</label>
                    <input type="email" id="email" class="border border-black rounded-lg">
                    <label for="password">Password</label>
                    <input type="password" name="" id="password" class="border border-black rounded-lg">
                    <label for="contact">Mobile number</label>
                    <input type="tel" inputmode="numeric" name="" id="contact" pattern="[0-9]{10}" maxlength="10" class="border border-black rounded-lg ">
                    
                    <input type="submit" value="Register" class="bg-blue-400 "  >
                </form>
            </div>
    </div>
</body>
</html>
