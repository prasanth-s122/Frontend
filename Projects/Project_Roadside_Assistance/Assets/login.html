<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Aid - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-animated-gradient min-h-screen flex items-center justify-center text-slate-200 p-4">

    <!-- Decorative glowing orbs -->
    <div class="fixed top-1/4 left-1/4 w-64 h-64 bg-neonBlue rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-pulse-slow pointer-events-none"></div>
    <div class="fixed bottom-1/4 right-1/4 w-64 h-64 bg-neonPurple rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-pulse-slow pointer-events-none" style="animation-delay: 2s;"></div>

    <div class="w-full max-w-md animate-slide-up relative z-10">
        
        <!-- Logo / Brand -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold tracking-tight mb-2"><span class="text-gradient">Auto Aid</span></h1>
            <p class="text-slate-400">Welcome back! Please login to your account.</p>
        </div>

        <div class="glass p-8 sm:p-10 rounded-2xl relative overflow-hidden">
            <!-- Glowing accent line at top -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-neonBlue to-neonPurple"></div>
            
            <form action="main.html" method="post" class="space-y-6">

                <div class="space-y-5">
                    <!-- Mail -->
                    <div>
                        <label class="block text-slate-300 text-sm font-semibold mb-2" for="email">E-mail Address</label>
                        <input type="email" id="email" placeholder="john@example.com" class="glass-input w-full px-5 py-3 rounded-xl" required>
                    </div>

                    <!-- Password -->
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="block text-slate-300 text-sm font-semibold" for="password">Password</label>
                            <a href="#" class="text-sm text-neonBlue hover:text-neonPurple transition-colors">Forgot Password?</a>
                        </div>
                        <input type="password" id="password" placeholder="••••••••" class="glass-input w-full px-5 py-3 rounded-xl" required>
                    </div>
                </div>

                <!-- Button -->
                <div class="pt-6">
                    <button type="submit" class="w-full py-3.5 px-4 bg-gradient-to-r from-neonBlue to-neonPurple text-white font-bold text-lg rounded-xl shadow-[0_0_15px_rgba(0,242,254,0.4)] hover:shadow-[0_0_25px_rgba(0,242,254,0.6)] transform hover:-translate-y-1 transition-all duration-300">
                        Sign In
                    </button>
                </div>
                
                <p class="text-center text-sm text-slate-400 mt-6">
                    Don't have an account? <a href="../index.html" class="text-neonBlue hover:text-neonPurple transition-colors font-semibold">Sign up</a>
                </p>

            </form>
        </div>
    </div>

</body>
</html>
