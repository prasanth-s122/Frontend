<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Aid - Mechanics Confirmed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .success-checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto;
            stroke-width: 4;
            stroke: #10b981;
            fill: none;
            stroke-miterlimit: 10;
            box-shadow: inset 0px 0px 0px #10b981;
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
            position: relative;
            top: 5px;
            right: 5px;
            margin-bottom: 30px;
        }

        .success-checkmark__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 4;
            stroke-miterlimit: 10;
            stroke: #10b981;
            fill: rgba(16, 185, 129, 0.1);
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .success-checkmark__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }

        @keyframes stroke {
            100% { stroke-dashoffset: 0; }
        }

        @keyframes scale {
            0%, 100% { transform: none; }
            50% { transform: scale3d(1.1, 1.1, 1); }
        }

        @keyframes fill {
            100% { box-shadow: inset 0px 0px 0px 30px rgba(16, 185, 129, 0.1); }
        }
    </style>
</head>
<body class="bg-animated-gradient min-h-screen flex text-slate-200 items-center justify-center p-4">

    <!-- Decorative glowing orbs -->
    <div class="fixed top-1/4 left-1/4 w-64 h-64 bg-emerald-500 rounded-full mix-blend-multiply filter blur-[150px] opacity-20 animate-pulse-slow pointer-events-none"></div>
    <div class="fixed bottom-1/4 right-1/4 w-64 h-64 bg-teal-500 rounded-full mix-blend-multiply filter blur-[150px] opacity-20 animate-pulse-slow pointer-events-none" style="animation-delay: 2s;"></div>

    <div class="glass w-full max-w-md p-10 rounded-3xl text-center shadow-2xl relative overflow-hidden animate-slide-up">
        
        <!-- Glowing accent line -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-400 to-teal-400"></div>

        <!-- Animated Checkmark -->
        <svg class="success-checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
            <circle class="success-checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
            <path class="success-checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
        </svg>

        <h1 class="text-3xl font-bold bg-gradient-to-r from-emerald-400 to-teal-400 text-transparent bg-clip-text mb-4 tracking-tight">Request Confirmed</h1>

        <p class="text-slate-400 mb-10 leading-relaxed">
            Your mechanic assistance request has been successfully submitted. A nearby expert will contact you shortly and arrive at your location.
        </p>

        <a href="main.html" class="inline-block w-full bg-slate-800 text-white font-semibold py-3.5 px-6 rounded-xl border border-slate-700 hover:border-emerald-500 hover:bg-emerald-500 hover:text-black hover:shadow-[0_0_20px_rgba(16,185,129,0.4)] transform hover:-translate-y-1 transition-all duration-300">
            Back to Dashboard
        </a>

    </div>

</body>
</html>
