<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Aid - 4-Wheeler Fuel Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-animated-gradient min-h-screen flex text-slate-200 p-4 items-center justify-center">

    <!-- Decorative glowing orbs -->
    <div class="fixed top-1/4 left-1/4 w-64 h-64 bg-neonBlue rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-pulse-slow pointer-events-none"></div>
    <div class="fixed bottom-1/4 right-1/4 w-64 h-64 bg-neonPurple rounded-full mix-blend-multiply filter blur-[100px] opacity-30 animate-pulse-slow pointer-events-none" style="animation-delay: 2s;"></div>

    <div class="w-full max-w-lg animate-slide-up relative z-10">
        
        <!-- Back Link -->
        <a href="fuel.html" class="inline-flex items-center text-slate-400 hover:text-white transition group mb-6">
            <svg class="w-5 h-5 mr-2 transform group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Fuel Services
        </a>

        <div class="glass p-8 sm:p-10 rounded-2xl relative overflow-hidden">
            <!-- Glowing accent line at top -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-neonBlue to-neonPurple"></div>
            
            <form action="Fuel_order.html" method="post" class="space-y-6">
                
                <!-- Title -->
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-white mb-2 tracking-tight"><span class="text-gradient">4-Wheeler</span> Fuel</h2>
                    <p class="text-slate-400 text-sm">Bulk delivery from 13 up to 60 litres.</p>
                </div>

                <div class="space-y-5">
                    
                    <!-- Fuel Type -->
                    <div>
                        <p class="block text-slate-300 text-sm font-semibold mb-3">Fuel Type</p>
                        <div class="flex gap-4">
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="fuel" value="petrol" class="peer sr-only" required checked>
                                <div class="glass-input text-center py-3 rounded-xl peer-checked:border-neonPurple peer-checked:shadow-[0_0_15px_rgba(168,85,247,0.3)] peer-checked:bg-slate-800 transition-all font-medium">Petrol</div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="fuel" value="diesel" class="peer sr-only" required>
                                <div class="glass-input text-center py-3 rounded-xl peer-checked:border-neonPurple peer-checked:shadow-[0_0_15px_rgba(168,85,247,0.3)] peer-checked:bg-slate-800 transition-all font-medium">Diesel</div>
                            </label>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <!-- Capacity -->
                        <div>
                            <label class="block text-slate-300 text-sm font-semibold mb-2" for="capacity">Capacity (Litres)</label>
                            <input type="number" min="13" max="60" id="capacity" placeholder="e.g. 20" class="glass-input w-full px-4 py-3 rounded-xl" required>
                        </div>
                        
                        <!-- Mobile number -->
                        <div>
                            <label class="block text-slate-300 text-sm font-semibold mb-2" for="contact">Contact Number</label>
                            <input type="tel" inputmode="numeric" name="" id="contact" pattern="[0-9]{10}" maxlength="10" placeholder="9876543210" class="glass-input w-full px-4 py-3 rounded-xl" required>
                        </div>
                    </div>

                    <!-- Location -->
                    <div>
                        <label class="block text-slate-300 text-sm font-semibold mb-2" for="address">Current Location</label>
                        <textarea name="" id="address" rows="3" placeholder="Describe your exact location or nearby landmarks..." class="glass-input w-full px-4 py-3 rounded-xl resize-none" required></textarea>
                    </div>

                </div>

                <!-- Button -->
                <div class="pt-4">
                    <button type="submit" class="w-full py-3.5 px-4 bg-gradient-to-r from-neonBlue to-neonPurple text-white font-bold text-lg rounded-xl shadow-[0_0_15px_rgba(168,85,247,0.4)] hover:shadow-[0_0_25px_rgba(168,85,247,0.6)] transform hover:-translate-y-1 transition-all duration-300">
                        Confirm Order
                    </button>
                </div>
                
            </form>
        </div>
    </div>

</body>
</html>
